name: Render Keep-Alive

on:
  schedule:
    # Render free tier sleeps after ~15 min with no HTTP traffic.
    - cron: '*/10 * * * *'
  workflow_dispatch:

concurrency:
  group: render-keepalive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping Render health endpoint
        run: |
          curl -fsS --max-time 90 "https://biomicshub-backend.onrender.com/health"
          echo ""
          echo "Render backend responded OK."
