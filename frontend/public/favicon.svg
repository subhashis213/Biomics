<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2e55;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1b2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leafGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7dd948;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a8f542;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stemGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6dd97d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d9d9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arcGradient" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#00d9d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bgGradient)"/>
  
  <!-- Main "b" shape -->
  <g transform="translate(256, 256)">
    <!-- Stem (vertical bar) -->
    <rect x="-45" y="-80" width="90" height="200" rx="15" fill="url(#stemGradient)" opacity="0.95"/>
    
    <!-- Bottom circle -->
    <circle cx="0" cy="60" r="65" fill="url(#arcGradient)" opacity="0.9"/>
    
    <!-- Top-right arc curve -->
    <path d="M 50,-30 Q 120,20 100,100" stroke="url(#arcGradient)" stroke-width="50" fill="none" stroke-linecap="round" opacity="0.85"/>
    
    <!-- Leaves (top-left) -->
    <g transform="translate(-60, -80)">
      <!-- Large leaf -->
      <ellipse cx="0" cy="-30" rx="25" ry="50" fill="url(#leafGradient)" opacity="0.95" transform="rotate(-25)"/>
      <!-- Medium leaf -->
      <ellipse cx="-30" cy="-10" rx="20" ry="40" fill="url(#leafGradient)" opacity="0.85" transform="rotate(-45)"/>
      <!-- Leaf vein details -->
      <line x1="-5" y1="-75" x2="-5" y2="15" stroke="#1a2e55" stroke-width="2" opacity="0.3"/>
      <line x1="-35" y1="-45" x2="-25" y2="5" stroke="#1a2e55" stroke-width="2" opacity="0.3"/>
    </g>
    
    <!-- Accent dots (yellow) -->
    <circle cx="80" cy="-70" r="12" fill="#ffc107" opacity="0.9"/>
    <circle cx="100" cy="-45" r="10" fill="#ffc107" opacity="0.85"/>
    <circle cx="70" cy="-100" r="8" fill="#ffc107" opacity="0.8"/>
  </g>
</svg>
